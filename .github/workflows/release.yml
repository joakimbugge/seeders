name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      tags:
        description: 'Space-separated git tags to publish (e.g. typeorm-seeder-v0.3.0 nest-typeorm-seeder-v0.2.0)'
        required: true
      dist-tag:
        description: 'npm dist-tag (use "backfill" for older versions, "latest" for the newest)'
        required: true
        default: latest

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      paths_released: ${{ steps.release.outputs.paths_released }}

    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  publish:
    needs: release-please
    runs-on: ubuntu-latest
    if: |
      always() && (
        (github.event_name == 'workflow_run' && needs.release-please.result == 'success' && needs.release-please.outputs.releases_created == 'true') ||
        github.event_name == 'workflow_dispatch'
      )
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Publish released packages
        if: github.event_name == 'workflow_run'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for path in $(echo '${{ needs.release-please.outputs.paths_released }}' | jq -r '.[]'); do
            pnpm --filter "./$path" run build
            cd "$path" && npm publish --access public && cd -
          done

      - name: Publish packages from tags
        if: github.event_name == 'workflow_dispatch'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for tag in ${{ inputs.tags }}; do
            pkg=$(echo "$tag" | sed 's/-v[0-9].*//')
            path="packages/$pkg"
            git checkout "$tag" -- "$path"
            pnpm --filter "./$path" run build
            cd "$path" && npm publish --access public --tag ${{ inputs.dist-tag }} && cd -
          done

  docs-build:
    needs: publish
    if: github.event_name == 'workflow_run' && needs.publish.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run docs:build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  docs-deploy:
    needs: docs-build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
